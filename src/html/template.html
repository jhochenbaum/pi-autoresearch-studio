<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

<a href="#tab-dashboard" class="skip-link">Skip to content</a>
<nav class="nav" aria-label="Primary navigation">
<div class="nav-left">
<span class="nav-brand">Autoresearch Studio</span>
<div class="nav-tabs" role="tablist" aria-label="Dashboard sections">
<button class="nav-tab active" role="tab" aria-selected="true" aria-controls="tab-dashboard" id="tab-btn-dashboard" data-tab="dashboard" onclick="showTab('dashboard')">Dashboard</button>
<button class="nav-tab" role="tab" aria-selected="false" aria-controls="tab-plan" id="tab-btn-plan" data-tab="plan" onclick="showTab('plan')">Plan</button>

</div>
</div>
<div class="nav-meta">
<span id="live-status" class="live-status connecting" aria-live="polite">● Connecting…</span>
<button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch theme">☀️ Light</button>
</div>
</nav>
<header class="header">
<h1>{{CONFIG_NAME}}</h1>
<p class="sub">{{CONFIG_SUBTITLE}}</p>
</header>
<main>
<section id="tab-dashboard" class="tab-content active" role="tabpanel" aria-labelledby="tab-btn-dashboard"></section>
<section id="tab-plan" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-plan" hidden></section>
<section id="tab-ideas" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-ideas" hidden></section>
<section id="tab-activity" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-activity" hidden></section>
</main>
<script>
const D={{DATA_JSON}};
let PLAN={{PLAN_JSON}};

const COMMITS={{COMMITS_JSON}};
{{JS}}
</script>
</body>
